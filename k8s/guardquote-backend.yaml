---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: guardquote-backend
  namespace: guardquote
  labels:
    app: guardquote-backend
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: guardquote-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  template:
    metadata:
      labels:
        app: guardquote-backend
    spec:
      containers:
        - name: backend
          image: guardquote-backend:v2.1
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: guardquote-secrets
                  key: database-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: guardquote-secrets
                  key: jwt-secret
            - name: ML_ENGINE_HOST
              value: guardquote-ml
            - name: ML_ENGINE_PORT
              value: "8000"
            - name: GRAFANA_URL
              value: "https://grafana.vandine.us"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /live        # lightweight — no DB call
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health  # DB check — gates traffic but won't kill pod
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: guardquote-backend
  namespace: guardquote
  labels:
    app: guardquote-backend
spec:
  type: ClusterIP
  selector:
    app: guardquote-backend
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
