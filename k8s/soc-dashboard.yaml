---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: soc-dashboard
  namespace: guardquote
  labels:
    app: soc-dashboard
    team: secops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: soc-dashboard
  template:
    metadata:
      labels:
        app: soc-dashboard
        team: secops
    spec:
      containers:
        - name: soc-dashboard
          image: soc-dashboard:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "32Mi"
              cpu: "25m"
            limits:
              memory: "64Mi"
              cpu: "100m"
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 30
          securityContext:
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            runAsNonRoot: false
---
apiVersion: v1
kind: Service
metadata:
  name: soc-dashboard
  namespace: guardquote
  labels:
    app: soc-dashboard
spec:
  type: NodePort
  selector:
    app: soc-dashboard
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30523
      protocol: TCP
